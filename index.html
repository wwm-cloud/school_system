function useAudioNotifications() {
  const ctxRef = React.useRef(null);
  const beep = React.useCallback((freq = 880, duration = 0.12) => {
    try {
      const ACtx = window.AudioContext || window.webkitAudioContext;
      if (!ACtx) return;
      if (!ctxRef.current) ctxRef.current = new ACtx();
      const ctx = ctxRef.current;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.value = 0.03;
      osc.start();
      setTimeout(() => osc.stop(), duration * 1000);
    } catch (e) {}
  }, []);
  return { playSent: () => beep(700, 0.08), playReceived: () => beep(1100, 0.12) };
}

function requestBrowserNotificationPermission() {
  try {
    if (typeof window === 'undefined' || !('Notification' in window)) return;
    if (Notification.permission === 'default') Notification.requestPermission().catch(() => {});
  } catch (e) {}
}
function useChatMessageAlerts(session, chats, notify) {
  const { playReceived } = useAudioNotifications();
  const initializedRef = React.useRef(false);
  const seenIdsRef = React.useRef(new Set());
  React.useEffect(() => {
    const relevant = (chats || []).filter(msg => {
      if (!session?.role) return false;
      if (session.role === 'admin') return msg.receiver_role === 'admin' && !msg.deleted_by_receiver;
      return msg.receiver_role === session.role && msg.receiver_id === session.linkedId && !msg.deleted_by_receiver;
    });
    if (!initializedRef.current) {
      seenIdsRef.current = new Set(relevant.map(msg => msg.id));
      initializedRef.current = true;
      return;
    }
    const unseen = relevant.filter(msg => !seenIdsRef.current.has(msg.id));
    if (!unseen.length) return;
    unseen.forEach(msg => seenIdsRef.current.add(msg.id));
    const latest = unseen[unseen.length - 1];
    const senderLabel = latest.sender_role === 'admin' ? 'School Admin' : (latest.sender_role || 'User');
    let preview = 'New message received';
    try {
      const parsed = JSON.parse(latest.message);
      if (parsed?.type === 'audio') preview = parsed.text ? `Audio message: ${parsed.text}` : 'New audio message received';
      else if (typeof latest.message === 'string' && latest.message.trim()) preview = latest.message.trim();
    } catch (e) {
      if (typeof latest.message === 'string' && latest.message.trim()) preview = latest.message.trim();
    }
    notify('info', `${senderLabel}: ${preview}`);
    playReceived();
    try {
      if (typeof window !== 'undefined' && 'Notification' in window && Notification.permission === 'granted') {
        new Notification('New message available', { body: `${senderLabel}: ${preview}` });
      }
    } catch (e) {}
  }, [session?.role, session?.linkedId, chats, notify, playReceived]);
}

async function syncProfilesBackedEntities(tableName, roleName, prevItems, nextItems) {
  const prevMap = new Map((prevItems || []).map(item => [item.id, item]));
  const nextMap = new Map((nextItems || []).map(item => [item.id, item]));
  for (const prev of prevItems || []) {
    if (!nextMap.has(prev.id)) {
      if (prev.profile_id) await supabase.from('profiles').delete().eq('id', prev.profile_id);
      else await supabase.from(tableName).delete().eq('id', prev.id);
    }
  }
  for (const item of nextItems || []) {
    if (item.id && prevMap.has(item.id)) {
      const prev = prevMap.get(item.id);
      if (prev.profile_id) {
        await supabase.from('profiles').update({ full_name: item.full_name, role: roleName, contact_address: item.contact_address, avatar_url: item.photo_url || null, account_active: item.account_active ?? true }).eq('id', prev.profile_id);
        await supabase.from(tableName).update({ contact_address: item.contact_address }).eq('id', item.id);
      }
    } else {
      const { data: profileInsert, error: profileError } = await supabase.from('profiles').insert({ full_name: item.full_name, role: roleName, contact_address: item.contact_address, avatar_url: item.photo_url || null, account_active: item.account_active ?? true, force_password_change: true }).select().single();
      if (profileError) throw profileError;
      const { error: rowError } = await supabase.from(tableName).insert({ profile_id: profileInsert.id, contact_address: item.contact_address });
      if (rowError) throw rowError;
    }
  }
}

    if (safeArray(item.assigned_class_ids).length) {
      const { error: classErr } = await supabase.from('teacher_class_assignments').insert(safeArray(item.assigned_class_ids).map(classId => ({ teacher_id: teacherId, class_id: classId })));
      if (classErr) throw classErr;
    }
    await supabase.from('teacher_subject_assignments').delete().eq('teacher_id', teacherId);
    if (safeArray(item.assigned_subject_ids).length) {
      const { error: subjectErr } = await supabase.from('teacher_subject_assignments').insert(safeArray(item.assigned_subject_ids).map(subjectId => ({ teacher_id: teacherId, subject_id: subjectId })));
      if (subjectErr) throw subjectErr;
    }
  }
}

async function syncStudents(prevItems, nextItems) {
  const prevMap = new Map((prevItems || []).map(item => [item.id, item]));
  const nextMap = new Map((nextItems || []).map(item => [item.id, item]));
  for (const prev of prevItems || []) {
    if (!nextMap.has(prev.id)) await supabase.from('students').delete().eq('id', prev.id);
  }
  for (const item of nextItems || []) {
    const row = {
      id: dbId(item.id),
      full_name: item.full_name,
      student_number: item.student_number || null,
      class_id: item.class_id || null,
      student_section: item.student_section || null,
      gender: item.gender || null,
      dob: item.dob || null,
      parent_full_name: item.parent_full_name || null,
      parent_phone_contact: item.parent_phone_contact || null,
      relationship: item.relationship || null,
      photo_url: item.photo_url || null,
      account_active: item.account_active ?? true
    };
    const { error } = await supabase.from('students').upsert(row);
    if (error) throw error;
  }
}

async function syncParents(prevItems, nextItems) {
  const nextMap = new Map((nextItems || []).map(item => [item.id, item]));
  for (const item of prevItems || []) {
    if (!nextMap.has(item.id)) continue;
  }
  for (const item of nextItems || []) {
    const { error } = await supabase.from('parents').update({ account_status: item.account_status, phone_contact: item.phone_contact || null, relationship: item.relationship || null, full_name: item.full_name }).eq('id', item.id);
    if (error) throw error;
  }
}

async function syncSimpleTable(tableName, prevItems, nextItems, transform) {
  const { deletes, upserts } = diffById(prevItems, nextItems);
  for (const id of deletes) {
    const { error } = await supabase.from(tableName).delete().eq('id', id);
    if (error) throw error;
  }
  for (const item of upserts) {
    const row = transform ? transform(item) : item;
    const { error } = await supabase.from(tableName).upsert(row);
    if (error) throw error;
  }
}

async function syncPresenceStatus(role, linkedId, isOnline) {
  if (!supabase || !linkedId || role === 'admin') return;
  const { data: existing, error: selectError } = await supabase.from('presence_status').select('id').eq('role', role).eq('linked_entity_id', linkedId).maybeSingle();
  if (selectError) throw selectError;
  if (existing?.id) {
    const { error } = await supabase.from('presence_status').update({ is_online: !!isOnline, last_seen: new Date().toISOString() }).eq('id', existing.id);
    if (error) throw error;
  } else {
    const { error } = await supabase.from('presence_status').insert({ role, linked_entity_id: linkedId, is_online: !!isOnline, last_seen: new Date().toISOString() });
    if (error) throw error;
  }
}


function usePersistentSchoolData() {
  const [data, setData] = React.useState(EMPTY_LIVE_DATA);
  const [loaded, setLoaded] = React.useState(false);
  const [busyText, setBusyText] = React.useState('');
  const [notifications, setNotifications] = React.useState([]);
  const [offlineState, setOfflineState] = React.useState({ isOnline: browserOnline(), hasCache: false, pendingCount: 0, lastSyncAt: '', syncing: false });
  const syncInProgressRef = React.useRef(false);
  const lastNoticeRef = React.useRef('');

  const notify = React.useCallback((type, message) => {
    const id = uid();
    setNotifications(prev => [...prev, { id, type, message }]);
    window.setTimeout(() => setNotifications(prev => prev.filter(item => item.id !== id)), 3200);
  }, []);
  const notifyOnce = React.useCallback((key, type, message) => {
    if (lastNoticeRef.current === key) return;
    lastNoticeRef.current = key;
    notify(type, message);
    window.setTimeout(() => {
      if (lastNoticeRef.current === key) lastNoticeRef.current = '';
    }, 2500);
  }, [notify]);
  const dismissNotification = React.useCallback((id) => setNotifications(prev => prev.filter(item => item.id !== id)), []);

  const syncCollectionByKey = React.useCallback(async (key, prevItems, nextItems) => {
    if (key === 'principals') await syncProfilesBackedEntities('principals', 'principal', prevItems, nextItems);
    else if (key === 'accountStaff') await syncProfilesBackedEntities('account_staff', 'accountant', prevItems, nextItems);
    else if (key === 'teachers') await syncTeachers(prevItems, nextItems);
    else if (key === 'students') await syncStudents(prevItems, nextItems);
    else if (key === 'parents') await syncParents(prevItems, nextItems);
    else if (key === 'classes') await syncSimpleTable('classes', prevItems, nextItems, item => ({ id: dbId(item.id), name: item.name, section: item.section || null }));
    else if (key === 'subjects') await syncSimpleTable('subjects', prevItems, nextItems, item => ({ id: dbId(item.id), name: item.name, code: item.code || null }));
    else if (key === 'timetable') await syncSimpleTable('timetable', prevItems, nextItems, item => ({ id: dbId(item.id), class_id: item.class_id, day_of_week: item.day_of_week, period_time: item.period_time, subject_id: item.subject_id, teacher_id: item.teacher_id }));
    else if (key === 'attendance') await syncSimpleTable('attendance', prevItems, nextItems, item => ({ id: dbId(item.id), class_id: item.class_id, student_id: item.student_id, teacher_id: item.teacher_id || null, attendance_date: item.date || item.attendance_date || today(), status: item.status, remarks: item.remarks || null }));
    else if (key === 'grades') await syncSimpleTable('grades', prevItems, nextItems, item => ({ id: dbId(item.id), class_id: item.class_id, student_id: item.student_id, teacher_id: item.teacher_id || null, subject_id: item.subject_id, term: item.term, academic_year: item.academic_year, mid_exam_50: Number(item.mid_exam_50 || 0), end_exam_50: Number(item.end_exam_50 || 0), grade_letter: item.grade_letter || null, interpretation: item.interpretation || null, position: item.position || null, teacher_initial: item.teacher_initial || null, locked: !!item.locked }));
    else if (key === 'fees') await syncSimpleTable('fees', prevItems, nextItems, item => ({ id: dbId(item.id), student_id: item.student_id, class_id: item.class_id, academic_year: item.academic_year, term: item.term, amount_due: Number(item.amount_due || 0), amount_paid: Number(item.amount_paid || 0), payment_method: item.payment_method || null, recorded_by: item.recorded_by || null }));
    else if (key === 'credentials') await syncSimpleTable('user_credentials', prevItems, nextItems, item => ({ id: dbId(item.id), role: item.role, linked_entity_id: item.linked_entity_id, username: item.username, temporary_password: item.temporary_password, force_password_change: fromYesNo(item.force_password_change), account_active: item.account_active ?? true }));
    else if (key === 'chats') await syncSimpleTable('chat_messages', prevItems, nextItems, item => ({ id: dbId(item.id), sender_role: item.sender_role, sender_id: item.sender_id || null, receiver_role: item.receiver_role, receiver_id: item.receiver_id || null, message: item.message, is_read: !!item.is_read, deleted_by_sender: !!item.deleted_by_sender, deleted_by_receiver: !!item.deleted_by_receiver, banned: !!item.banned, created_at: item.created_at || new Date().toISOString() }));
  }, []);

  const syncSchoolSettingsValue = React.useCallback(async (nextVal) => {
    const { error } = await supabase.from('school_settings').update({
      school_name: nextVal.school_name,
      address: nextVal.address || null,
      contact: nextVal.contact || null,
      location: nextVal.location || null,
      logo_url: nextVal.logo_url || null,
      theme_choice: normalizeThemeChoice(nextVal.theme_choice || 'emerald')
    }).eq('id', 1);
    if (error) throw error;
  }, []);

  const saveSnapshot = React.useCallback(async (nextData, extraMeta={}) => {
    const queue = await readOfflineQueue();
    const nextMeta = await writeOfflineCache(nextData, { pendingCount: queue.length, ...extraMeta });
    setOfflineState(prev => ({
      ...prev,
      hasCache: true,
      pendingCount: Number(nextMeta?.pendingCount ?? queue.length ?? prev.pendingCount),
      lastSyncAt: nextMeta?.lastSyncAt || prev.lastSyncAt
    }));
  }, []);

  const reloadData = React.useCallback(async ({ silent=false } = {}) => {
    try {
      const queue = await readOfflineQueue();
      const meta = await readOfflineMeta();
      const cached = await readOfflineCache();
      if (!supabase) {
        const next = cached || seedData();
        setData(next);
        await saveSnapshot(next, { lastSyncAt: meta.lastSyncAt || new Date().toISOString() });
        setOfflineState(prev => ({ ...prev, isOnline: browserOnline(), hasCache: !!cached, pendingCount: queue.length, lastSyncAt: meta.lastSyncAt || '' }));
        return;
      }
      if (!browserOnline()) {
        const next = cached || seedData();
        setData(next);
        setOfflineState(prev => ({ ...prev, isOnline: false, hasCache: !!cached, pendingCount: queue.length, lastSyncAt: meta.lastSyncAt || meta.cachedAt || '' }));
        if (!silent && cached) notifyOnce('offline-cache-open', 'info', 'Offline mode active. Showing locally saved data.');
        return;
      }
      const next = await fetchAllSchoolData();
      setData(next);
      const nowIso = new Date().toISOString();
      await writeOfflineCache(next, { lastSyncAt: nowIso, pendingCount: queue.length });
      setOfflineState(prev => ({ ...prev, isOnline: true, hasCache: true, pendingCount: queue.length, lastSyncAt: nowIso }));
    } catch (error) {
      console.error('Failed to load live school data', error);
      const cached = await readOfflineCache();
      const meta = await readOfflineMeta();
      const next = cached || seedData();
      setData(next);
      setOfflineState(prev => ({ ...prev, isOnline: browserOnline(), hasCache: !!cached, lastSyncAt: meta.lastSyncAt || meta.cachedAt || prev.lastSyncAt }));
      if (!silent) notifyOnce('live-load-failed', cached ? 'info' : 'error', cached ? 'Live data is unavailable. Last saved local data was opened.' : (error?.message || 'Failed to load live school data.'));
    } finally {
      setLoaded(true);
    }
  }, [notifyOnce, saveSnapshot]);

  const flushPendingChanges = React.useCallback(async () => {
    if (syncInProgressRef.current || !supabase || !browserOnline()) return false;
    const queue = await readOfflineQueue();
    if (!queue.length) {
      setOfflineState(prev => ({ ...prev, isOnline: true, pendingCount: 0, syncing: false }));
      return true;
    }
    syncInProgressRef.current = true;
    setOfflineState(prev => ({ ...prev, syncing: true, isOnline: true }));
    setBusyText('Synchronizing offline changes...');
    try {
      for (const entry of queue) {
        if (entry?.type === 'schoolSettings') await syncSchoolSettingsValue(entry.nextVal || defaultSchool);
        else if (entry?.type === 'collection') await syncCollectionByKey(entry.key, entry.prevItems || [], entry.nextItems || []);
      }
      await writeOfflineQueue([]);
      const fresh = await fetchAllSchoolData();
      const nowIso = new Date().toISOString();
      setData(fresh);
      await writeOfflineCache(fresh, { lastSyncAt: nowIso, pendingCount: 0 });
      setOfflineState(prev => ({ ...prev, isOnline: true, hasCache: true, pendingCount: 0, lastSyncAt: nowIso, syncing: false }));
      notify('success', 'Offline changes synchronized successfully.');
      return true;
    } catch (error) {
      console.error('Offline synchronization failed', error);
      notify('error', error?.message || 'Offline changes could not synchronize yet.');
      setOfflineState(prev => ({ ...prev, syncing: false }));
      return false;
    } finally {
      syncInProgressRef.current = false;
      setBusyText('');
    }
  }, [notify, syncCollectionByKey, syncSchoolSettingsValue]);

  React.useEffect(() => { reloadData(); }, [reloadData]);

  React.useEffect(() => {
    const handleOnline = async () => {
      setOfflineState(prev => ({ ...prev, isOnline: true }));
      await flushPendingChanges();
      await reloadData({ silent: true });
    };
    const handleOffline = async () => {
      const queue = await readOfflineQueue();
      const meta = await readOfflineMeta();
      setOfflineState(prev => ({ ...prev, isOnline: false, pendingCount: queue.length, lastSyncAt: meta.lastSyncAt || meta.cachedAt || prev.lastSyncAt }));
    };
    window.addEventListener('online', handleOnline);
    window.addEventListener('offline', handleOffline);
    return () => {
      window.removeEventListener('online', handleOnline);
      window.removeEventListener('offline', handleOffline);
    };
  }, [flushPendingChanges, reloadData]);

  React.useEffect(() => {
    if (!loaded || !supabase || !offlineState.isOnline || !offlineState.pendingCount || offlineState.syncing) return;
    const timer = window.setTimeout(() => { flushPendingChanges(); }, 900);
    return () => window.clearTimeout(timer);
  }, [loaded, offlineState.isOnline, offlineState.pendingCount, offlineState.syncing, flushPendingChanges]);

  React.useEffect(() => {
    if (!loaded || !supabase) return;
    const intervalId = window.setInterval(async () => {
      if (!browserOnline()) return;
      const queue = await readOfflineQueue();
      if (!queue.length) return;
      setOfflineState(prev => ({ ...prev, isOnline: true, pendingCount: queue.length }));
      await flushPendingChanges();
    }, 5000);
    return () => window.clearInterval(intervalId);
  }, [loaded, flushPendingChanges]);

  const persist = React.useCallback(async next => {
    setData(next);
    await saveSnapshot(next);
  }, [saveSnapshot]);

  const setSchoolSettings = React.useCallback(async updater => {
    const nextVal = typeof updater === 'function' ? updater(data.schoolSettings) : updater;
    try {
      setBusyText(browserOnline() ? 'Saving school settings...' : 'Saving school settings locally...');
      if (!supabase || !browserOnline()) {
        const nextData = { ...data, schoolSettings: nextVal };
        setData(nextData);
        const pendingCount = supabase ? await appendOfflineQueue({ type: 'schoolSettings', nextVal, created_at: new Date().toISOString() }) : offlineState.pendingCount;
        await writeOfflineCache(nextData, { pendingCount, lastSyncAt: offlineState.lastSyncAt || '' });
        setOfflineState(prev => ({ ...prev, isOnline: browserOnline(), hasCache: true, pendingCount, lastSyncAt: prev.lastSyncAt }));
        notify(supabase ? 'info' : 'success', supabase ? 'Offline save stored locally. It will sync when internet returns.' : 'School settings saved.');
        return;
      }
      await syncSchoolSettingsValue(nextVal);
      await reloadData({ silent: true });
      notify('success', 'School settings saved.');
    } catch (error) {
      console.error('School settings save failed', error);
      notify('error', error?.message || 'Failed to save school settings.');
      throw error;
    } finally {
      setBusyText('');
    }
  }, [data, offlineState.pendingCount, offlineState.lastSyncAt, notify, reloadData, syncSchoolSettingsValue]);

  const updateCollection = React.useCallback(async (key, updater, options={}) => {
    const prevItems = clonePlain(data[key] || []);
    const nextItems = clonePlain(typeof updater === 'function' ? updater(prevItems) : updater);
    const { silentSuccess=false, suppressBusy=false, offlineNotice=true, optimistic=false } = options || {};
    const nextData = { ...data, [key]: nextItems };
    try {
      if (!suppressBusy) setBusyText(browserOnline() ? `Saving ${key}...` : `Saving ${key} locally...`);
      if (optimistic) {
        setData(nextData);
        await writeOfflineCache(nextData, { pendingCount: offlineState.pendingCount, lastSyncAt: offlineState.lastSyncAt || '' });
      }
      if (!supabase || !browserOnline()) {
        if (!optimistic) setData(nextData);
        const pendingCount = supabase ? await appendOfflineQueue({ type: 'collection', key, prevItems, nextItems, created_at: new Date().toISOString() }) : offlineState.pendingCount;
        await writeOfflineCache(nextData, { pendingCount, lastSyncAt: offlineState.lastSyncAt || '' });
        setOfflineState(prev => ({ ...prev, isOnline: browserOnline(), hasCache: true, pendingCount, lastSyncAt: prev.lastSyncAt }));
        if (!silentSuccess) {
          if (supabase && offlineNotice) notify('info', `${key} saved locally and queued for sync.`);
          else if (!supabase) notify('success', `${key} updated.`);
        }
        return;
      }
      await syncCollectionByKey(key, prevItems, nextItems);
      if (!optimistic) {
        await reloadData({ silent: true });
      } else {
        const nowIso = new Date().toISOString();
        await writeOfflineCache(nextData, { pendingCount: offlineState.pendingCount, lastSyncAt: nowIso });
        setOfflineState(prev => ({ ...prev, isOnline: true, hasCache: true, lastSyncAt: nowIso }));
        reloadData({ silent: true }).catch(() => {});
      }
      if (!silentSuccess) notify('success', `${key} saved successfully.`);
    } catch (error) {
      if (optimistic) {
        const rollbackData = { ...data, [key]: prevItems };
        setData(rollbackData);
        await writeOfflineCache(rollbackData, { pendingCount: offlineState.pendingCount, lastSyncAt: offlineState.lastSyncAt || '' });
      }
      console.error(`Failed to update ${key}`, error);
      notify('error', error?.message || `Failed to save ${key}.`);
      throw error;
    } finally {
      if (!suppressBusy) setBusyText('');
    }
  }, [data, offlineState.pendingCount, offlineState.lastSyncAt, notify, reloadData, syncCollectionByKey]);

  React.useEffect(() => {
    const savePublishState = async () => {
      const publishMap = Object.fromEntries(safeArray(data.grades).filter(row => row?.id).map(row => [row.id, !!row.published]));
      await writeGradePublishMap(publishMap);
    };
    savePublishState();
  }, [data.grades]);

  const setPresenceStatus = React.useCallback(async (role, linkedId, isOnline) => {
    const nextPresenceRows = (() => {
      const rows = safeArray(data.presenceRows);
      const idx = rows.findIndex(row => row?.role === role && String(row?.linked_entity_id || '') === String(linkedId || ''));
      if (idx >= 0) {
        return rows.map((row, index) => index === idx ? { ...row, role, linked_entity_id: linkedId, is_online: !!isOnline, last_seen: new Date().toISOString() } : row);
      }
      return [...rows, { id: uid(), role, linked_entity_id: linkedId, is_online: !!isOnline, last_seen: new Date().toISOString() }];
    })();
    const nextData = { ...data, presenceRows: nextPresenceRows, presence: { ...data.presence, [role]: { ...(data.presence[role] || { name: ROLE_LABELS[role] }), online: !!isOnline } } };
    setData(nextData);
    await writeOfflineCache(nextData, { lastSyncAt: offlineState.lastSyncAt || '' });
    if (!supabase || !browserOnline()) return;
    try { await syncPresenceStatus(role, linkedId, isOnline); } catch (error) { console.error('Presence sync failed', error); }
  }, [data, offlineState.lastSyncAt]);

  return { data, loaded, persist, updateCollection, setSchoolSettings, reloadData, setPresenceStatus, notify, notifications, dismissNotification, busyText, offlineState, flushPendingChanges };
}

function linkedEntityName(data, role, linkedId) {
  const collection = role === 'teacher' ? data.teachers : role === 'student' ? data.students : role === 'parent' ? data.parents : role === 'accountant' ? data.accountStaff : role === 'principal' ? data.principals : [];
  return collection.find(x => x.id === linkedId)?.full_name || ROLE_LABELS[role];
}
function availableLinkedRecords(data, role) { if (role === 'teacher') return data.teachers; if (role === 'student') return data.students; if (role === 'parent') return data.parents; if (role === 'accountant') return data.accountStaff; if (role === 'principal') return data.principals; return []; }
function getUnreadChatCount(chats, role, linkedId) {
  return (chats || []).filter(msg => {
    if (msg?.is_read) return false;
    if (msg?.deleted_by_receiver) return false;
    if (role === 'admin') return msg?.receiver_role === 'admin';
    return msg?.receiver_role === role && msg?.receiver_id === linkedId;
  }).length;
}

function validateCollectionRecord(kind, item, existingItems, identityField='id') {
  const peers = (existingItems || []).filter(x => x[identityField] !== item[identityField]);
  if (kind === 'teacher') {
    if (!item.full_name?.trim()) throw new Error('Teacher full name is required.');
    if (item.emis_code && peers.some(x => (x.emis_code || '').trim().toLowerCase() === item.emis_code.trim().toLowerCase())) throw new Error('Teacher EMIS code already exists.');
    if (item.ghana_card && peers.some(x => (x.ghana_card || '').trim().toLowerCase() === item.ghana_card.trim().toLowerCase())) throw new Error('Teacher Ghana Card already exists.');
  }
  if (kind === 'student') {
    if (!item.full_name?.trim()) throw new Error('Student full name is required.');
    if (!item.class_id) throw new Error('Assign a class before saving the student.');
    if (!isValidPhone(item.parent_phone_contact || '')) throw new Error('Parent phone contact must contain 9 to 15 digits.');
  }
  if (kind === 'class') {
    if (peers.some(x => (x.name || '').trim().toLowerCase() === (item.name || '').trim().toLowerCase() && (x.section || '').trim().toLowerCase() === (item.section || '').trim().toLowerCase())) throw new Error('That class and section already exist.');
  }
  if (kind === 'subject') {
    if (peers.some(x => (x.name || '').trim().toLowerCase() === (item.name || '').trim().toLowerCase())) throw new Error('That subject already exists.');
  }
}

function App() {
  const store = usePersistentSchoolData();
  const [session, setSession] = React.useState({ role: null, linkedId: null, credentialId: null, username: '' });
  const [activeNav, setActiveNav] = React.useState('dashboard');
  const [authReady, setAuthReady] = React.useState(false);
  const [forcePasswordModal, setForcePasswordModal] = React.useState(false);
  const [themeChoice, setThemeChoiceState] = React.useState(() => normalizeThemeChoice(localStorage.getItem(THEME_STORAGE_KEY) || 'emerald'));
  const [mobileNavOpen, setMobileNavOpen] = React.useState(false);
  const setThemeChoice = React.useCallback((value) => {
    const nextTheme = normalizeThemeChoice(value);
    setThemeChoiceState(nextTheme);
    try { localStorage.setItem(THEME_STORAGE_KEY, nextTheme); } catch (e) {}
  }, []);

  React.useEffect(() => {
    (async () => {
      try { if (supabase) await ensureSupabaseBrowserSession(); } catch (error) { console.error('Supabase browser session init failed', error); }
      setAuthReady(true);
    })();
  }, []);

  React.useEffect(() => { applyTheme(themeChoice); }, [themeChoice]);

  React.useEffect(() => {
    if (!store.loaded) return;
    const nextTheme = normalizeThemeChoice(store.data.schoolSettings?.theme_choice || localStorage.getItem(THEME_STORAGE_KEY) || 'emerald');
    if (nextTheme !== themeChoice) setThemeChoiceState(nextTheme);
    else applyTheme(nextTheme);
    updateBrowserBranding(store.data.schoolSettings || {});
  }, [store.loaded, store.data.schoolSettings]);

  React.useEffect(() => {
    if (!authReady || !store.loaded) return;
    const saved = loadAppUserSession();
    if (!saved?.credentialId) return;
    const credential = store.data.credentials.find(c => c.id === saved.credentialId && c.account_active);
    if (!credential) { clearAppUserSession(); return; }
    setSession({ role: credential.role, linkedId: credential.linked_entity_id, credentialId: credential.id, username: credential.username });
    if (credential.force_password_change === 'Yes') setForcePasswordModal(true);
  }, [authReady, store.loaded, store.data.credentials]);

  const loginWithCredentials = React.useCallback(async (username, password) => {
    const credential = store.data.credentials.find(c => (c.username || '').trim().toLowerCase() === String(username || '').trim().toLowerCase() && c.account_active);
    if (!credential) throw new Error('Invalid username or password.');
    if ((credential.temporary_password || '') !== String(password || '')) throw new Error('Invalid username or password.');
    await store.setPresenceStatus(credential.role, credential.linked_entity_id, true);
    const nextSession = { role: credential.role, linkedId: credential.linked_entity_id, credentialId: credential.id, username: credential.username };
    setSession(nextSession);
    saveAppUserSession(nextSession);
    setActiveNav('dashboard');
    setForcePasswordModal(credential.force_password_change === 'Yes');
    return credential;
  }, [store]);

  const logout = React.useCallback(async () => {
    if (session.role) await store.setPresenceStatus(session.role, session.linkedId, false);
    clearAppUserSession();
    setSession({ role: null, linkedId: null, credentialId: null, username: '' });
    setActiveNav('dashboard');
    setForcePasswordModal(false);
    setMobileNavOpen(false);
  }, [session, store]);

  const changeOwnPassword = React.useCallback(async (newPassword) => {
    if (!session.credentialId) return;
    await store.updateCollection('credentials', items => items.map(item => item.id === session.credentialId ? { ...item, temporary_password: newPassword, force_password_change: 'No' } : item));
    setForcePasswordModal(false);
  }, [session.credentialId, store]);

  if (!store.loaded || !authReady) return <div className="p-10 text-center">Loading system...</div>;
  return <DataContext.Provider value={store}><SessionContext.Provider value={{ session, setSession, activeNav, setActiveNav, loginWithCredentials, logout, forcePasswordModal, setForcePasswordModal, changeOwnPassword, themeChoice, setThemeChoice, mobileNavOpen, setMobileNavOpen }}><div className="min-h-screen flex flex-col"><Header /><OfflineStateBanner state={store.offlineState} onSync={store.flushPendingChanges} /><div className="flex flex-1 min-h-0">{session.role && <Sidebar />}<main className="flex-1 p-3 md:p-6 overflow-x-hidden">{!session.role ? <LoginScreen /> : <DashboardRouter />}</main></div><AppFooter /><ForcePasswordChangeModal open={!!session.role && forcePasswordModal} onSave={changeOwnPassword} /><BusyOverlay text={store.busyText} /><ToastStack notifications={store.notifications} onDismiss={store.dismissNotification} /></div></SessionContext.Provider></DataContext.Provider>;
}

function StudentManagement() {
  const { data, updateCollection, notify } = React.useContext(DataContext); const [open, setOpen] = React.useState(false); const [form, setForm] = React.useState(emptyStudent);
  const promotionYear = latestAcademicYearFromGrades(data.grades);
  const save = async e => { e.preventDefault(); const prefix = numberPrefix(data.schoolSettings.school_name, 'STU'); const selectedClass = data.classes.find(c => c.id === form.class_id); const payload = { ...form, id: form.id || uid(), student_number: form.student_number || `${prefix}${String(data.students.length + 2001).padStart(5,'0')}`, student_section: form.student_section || selectedClass?.section || '', account_active: form.account_active ?? true }; validateCollectionRecord('student', payload, data.students); await updateCollection('students', items => items.some(x => x.id === payload.id) ? items.map(x => x.id === payload.id ? payload : x) : [...items, payload]); setOpen(false); setForm(emptyStudent); };
  const edit = s => { setForm(s); setOpen(true); }; const remove = async id => { if (!confirmDeleteAction('this student record')) return; await updateCollection('students', items => items.filter(x => x.id !== id)); };
  const runAutoPromotion = async () => {
    const term3Students = data.students.filter(student => evaluatePromotion(data, student, promotionYear).evaluated);
    if (!term3Students.length) { notify('info', `No Term 3 grades were found for ${promotionYear}.`); return; }
    await updateCollection('students', items => items.map(student => {

    }));
    notify('success', `Auto promotion completed for ${promotionYear}.`);
  };

function TeacherGrades({ teacher }) {
  const { data, updateCollection } = React.useContext(DataContext);
  const [open, setOpen] = React.useState(false);
  const [form, setForm] = React.useState(emptyGrade);
  const teacherClasses = data.classes.filter(c => safeArray(teacher.assigned_class_ids).includes(c.id));
  const teacherSubjects = data.subjects.filter(s => safeArray(teacher.assigned_subject_ids).includes(s.id));
  const studentOptions = data.students.filter(s => s.class_id === form.class_id && safeArray(teacher.assigned_class_ids).includes(s.class_id));
  const [filterClass, setFilterClass] = React.useState('');
  const rows = data.grades.filter(g => g.teacher_id === teacher.id && (!filterClass || g.class_id === filterClass));
  const save = async e => {
    e.preventDefault();
    const computed = calcGradeRecord(form);
    const existingRow = rows.find(x => x.id === form.id) || data.grades.find(x => x.id === form.id);
    const payload = {
      ...form,
      id: form.id || uid(),
      teacher_id: teacher.id,
      teacher_initial: teacher.full_name.split(/\s+/).map(x => x[0]).join('').slice(0,3).toUpperCase(),
      ...computed,
      locked: form.locked || false,
      published: existingRow?.published || form.published || false,
      position: Number(form.position || 1),
      end_exam_50: Number(form.end_exam_50),
      mid_exam_50: Number(form.mid_exam_50)
    };
    await updateCollection('grades', items => {
      const exists = items.some(x => x.id === payload.id);
      const next = exists ? items.map(x => x.id === payload.id ? payload : x) : [payload, ...items];
      return next.map((g, _, arr) => {
        if (g.class_id !== payload.class_id || g.subject_id !== payload.subject_id || g.term !== payload.term || g.academic_year !== payload.academic_year) return g;
        const sameBucket = arr.filter(a => a.class_id === g.class_id && a.subject_id === g.subject_id && a.term === g.term && a.academic_year === g.academic_year).sort((a,b) => Number(b.total_score||0) - Number(a.total_score||0));
        const pos = sameBucket.findIndex(a => a.id === g.id) + 1;
        return { ...g, position: pos };
      });
    });
    setOpen(false);
    setForm(emptyGrade);
  };
  const edit = row => { setForm({ ...row }); setOpen(true); };
  const remove = async id => { if (!confirmDeleteAction('this grade record')) return; await updateCollection('grades', items => items.filter(x => x.id !== id)); };
  const togglePublish = async row => {
    await updateCollection('grades', items => items.map(x => x.id === row.id ? { ...x, published: !x.published } : x));
  };
  const livePreview = calcGradeRecord(form);
  return <div className="space-y-4"><SectionHeader title="Grades" subtitle="Teachers must publish grades before students and parents can view them." actions={<><Field label=""><select className="select" value={filterClass} onChange={e => setFilterClass(e.target.value)}><option value="">All assigned classes</option>{teacherClasses.map(c => <option key={c.id} value={c.id}>{fullClassName(c)}</option>)}</select></Field><button onClick={() => { setForm({ ...emptyGrade, class_id: teacher.assigned_class_ids?.[0] || '' }); setOpen(true); }} className="btn btn-primary"><i className="fas fa-plus mr-2"></i>Add Student Grade</button></>} /><Table columns={['Student','Class','Subject','Term','Mid Semester Exams A (50)','End of Semester Exams B (50)','Total A+B%','Grade','Interpretation','Position','Teacher Initial','Publish','Lock','Actions']} rows={rows} renderCell={(row,c) => { if (c === 'Student') return data.students.find(x => x.id === row.student_id)?.full_name || ''; if (c === 'Class') return fullClassName(data.classes.find(x => x.id === row.class_id)); if (c === 'Subject') return data.subjects.find(x => x.id === row.subject_id)?.name || ''; if (c === 'Term') return row.term; if (c === 'Mid Semester Exams A (50)') return <span className="text-blue-700 font-bold">{row.mid_exam_50}</span>; if (c === 'End of Semester Exams B (50)') return <span className="text-blue-700 font-bold">{row.end_exam_50}</span>; if (c === 'Total A+B%') return <span className="text-red-700 font-extrabold">{row.total_score}</span>; if (c === 'Grade') return <span className="text-blue-700 font-bold">{row.grade_letter}</span>; if (c === 'Interpretation') return <span className="text-blue-700 font-bold">{row.interpretation}</span>; if (c === 'Position') return <span className="text-green-700 font-extrabold">{row.position}</span>; if (c === 'Teacher Initial') return row.teacher_initial; if (c === 'Publish') return <div className="flex items-center gap-2">{row.published ? <span className="pill online">Published</span> : <span className="pill absent">Draft</span>}<button className={`btn ${row.published ? 'btn-secondary' : 'btn-primary'}`} onClick={() => togglePublish(row)}>{row.published ? 'Unpublish' : 'Publish'}</button></div>; if (c === 'Lock') return <span className={`pill ${row.locked ? 'absent' : 'online'}`}>{row.locked ? 'Locked' : 'Open'}</span>; if (c === 'Actions') return <div className="flex gap-2"><button className="btn btn-outline" onClick={() => edit(row)}>Edit</button><button className="btn btn-danger" onClick={() => remove(row.id)}>Delete</button></div>; }} /><Modal open={open} onClose={() => setOpen(false)} title={form.id ? 'Edit Student Grade' : 'Add Student Grade'}><form onSubmit={save} className="space-y-4"><div className="grid md:grid-cols-2 gap-4"><Field label="Class"><select className="select" required value={form.class_id} onChange={e => setForm({ ...form, class_id: e.target.value, student_id: '' })}><option value="">Select class</option>{teacherClasses.map(c => <option key={c.id} value={c.id}>{fullClassName(c)}</option>)}</select></Field><Field label="Term"><select className="select" value={form.term} onChange={e => setForm({ ...form, term: e.target.value })}>{TERMS.map(x => <option key={x}>{x}</option>)}</select></Field><Field label="Academic Year"><input className="input" value={form.academic_year} onChange={e => setForm({ ...form, academic_year: e.target.value })} /></Field><Field label="Student"><select className="select" required value={form.student_id} onChange={e => setForm({ ...form, student_id: e.target.value })}><option value="">Select student</option>{studentOptions.map(s => <option key={s.id} value={s.id}>{s.full_name}</option>)}</select></Field><Field label="Subject"><select className="select" required value={form.subject_id} onChange={e => setForm({ ...form, subject_id: e.target.value })}><option value="">Select subject</option>{teacherSubjects.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}</select></Field><Field label="Mid Semester Exams A (50)"><input type="number" min="0" max="50" className="input text-blue-700 font-bold" value={form.mid_exam_50} onChange={e => setForm({ ...form, mid_exam_50: e.target.value })} /></Field><Field label="End of Semester Exams B (50)"><input type="number" min="0" max="50" className="input text-blue-700 font-bold" value={form.end_exam_50} onChange={e => setForm({ ...form, end_exam_50: e.target.value })} /></Field><Field label="Auto Total"><input className="input text-red-700 font-extrabold" readOnly value={Number(form.mid_exam_50 || 0) + Number(form.end_exam_50 || 0)} /></Field><Field label="Auto Grade"><input className="input text-blue-700 font-bold" readOnly value={livePreview.grade_letter || ''} /></Field><Field label="Auto Interpretation"><input className="input text-blue-700 font-bold" readOnly value={livePreview.interpretation || ''} /></Field><Field label="Position"><input className="input text-green-700 font-extrabold" readOnly value={form.id ? form.position || '' : 'Auto after save'} /></Field></div><div className="rounded-xl border border-blue-200 bg-blue-50 px-4 py-3 text-sm text-blue-900">Saved grades remain hidden from students and parents until the teacher clicks Publish.</div><div className="flex justify-end gap-2"><button type="button" className="btn btn-secondary" onClick={() => setOpen(false)}>Cancel</button><button type="submit" className="btn btn-primary">{form.id ? 'Update Grade' : 'Save Grade'}</button></div></form></Modal></div>;

function StudentDashboard({ activeNav }) {

function StudentGrades({ student }) {
  const { data } = React.useContext(DataContext);
  const [term, setTerm] = React.useState('');
  const [year, setYear] = React.useState('');
  const allRows = data.grades.filter(g => g.student_id === student.id && g.published);
  const rows = allRows.filter(g => (!term || g.term === term) && (!year || g.academic_year === year));
  const hasLockedGrades = allRows.some(g => g.locked);
  const attendanceRows = data.attendance.filter(a => a.student_id === student.id);
  const printReport = () => {
    if (hasLockedGrades || !rows.length) return;
    const reportYear = year || rows[0]?.academic_year || latestAcademicYearFromGrades(data.grades);
    const promotion = evaluatePromotion({ ...data, grades: allRows }, student, reportYear);
    openStudentGradeReportPrint({
      school: data.schoolSettings,
      student,
      classLabel: fullClassName(data.classes.find(x => x.id === student.class_id)),
      term: term || rows[0]?.term || '',
      year: reportYear,
      attendanceRows,
      promotionText: promotion.statusText,
      promotionColor: promotion.reportColor,
      rows: rows.map(row => ({ ...row, subject_name: data.subjects.find(x => x.id === row.subject_id)?.name || '' }))
    });
  };
  const noPublishedRows = !allRows.length;
  return <div className="space-y-4"><SectionHeader title="Grades" subtitle={noPublishedRows ? 'No grades have been published for this student yet.' : (hasLockedGrades ? 'Published grades are currently locked. Please contact the Accounts Office for clarification.' : 'View and print the published student end of semester report.')} actions={<><Field label=""><select className="select" value={term} onChange={e => setTerm(e.target.value)}><option value="">All terms</option>{TERMS.map(x => <option key={x}>{x}</option>)}</select></Field><Field label=""><input className="input" placeholder="Academic year" value={year} onChange={e => setYear(e.target.value)} /></Field>{!noPublishedRows && !hasLockedGrades && <button className="btn btn-outline" onClick={printReport}><i className="fas fa-print mr-2"></i>Print Grade Report</button>}</>} />{noPublishedRows ? <div className="card p-6 border border-slate-200 bg-slate-50 text-slate-700"><div className="text-lg font-bold mb-2">No Grades Published Yet</div><p>Your teacher has not published any grades yet. Once grades are published, they will appear here for students and parents.</p></div> : hasLockedGrades ? <div className="card p-6 border border-amber-200 bg-amber-50 text-amber-900"><div className="text-lg font-bold mb-2">Grade Report Notice</div><p>This student's published grade report is currently locked. Please contact the Accounts Office for clarification before grades can be viewed or printed.</p></div> : rows.length ? <Table columns={['Student','Class','Subject','Term','Mid Semester Exams A (50)','End of Semester Exams B (50)','Total A+B%','Grade','Interpretation','Position','Teacher Initial','Status']} rows={rows} renderCell={(row,c) => { if (c === 'Student') return student.full_name; if (c === 'Class') return fullClassName(data.classes.find(x => x.id === row.class_id)); if (c === 'Subject') return data.subjects.find(x => x.id === row.subject_id)?.name || ''; if (c === 'Term') return row.term; if (c === 'Mid Semester Exams A (50)') return row.mid_exam_50; if (c === 'End of Semester Exams B (50)') return row.end_exam_50; if (c === 'Total A+B%') return row.total_score; if (c === 'Grade') return row.grade_letter; if (c === 'Interpretation') return row.interpretation; if (c === 'Position') return row.position; if (c === 'Teacher Initial') return row.teacher_initial; if (c === 'Status') return <span className={`pill ${row.locked ? 'absent' : 'online'}`}>{row.locked ? 'Locked' : 'Published'}</span>; }} /> : <div className="card p-6 border border-slate-200 bg-slate-50 text-slate-700"><div className="text-lg font-bold mb-2">No Grades Published Yet</div><p>No grades have been published for the selected term or academic year.</p></div>}</div>;

function FeesStatement() {

function GradeLockControl() {

  const rows = data.students.map(st => { const feeRows = data.fees.filter(f => f.student_id === st.id); const outstanding = feeRows.reduce((sum, f) => sum + Number(f.balance || 0), 0); const anyLocked = data.grades.some(g => g.student_id === st.id && g.locked); return { ...st, outstanding, anyLocked }; });
  return <div className="space-y-4"><SectionHeader title="Grades Lock Control" subtitle="Students owing fees can be locked automatically or manually unlocked when fully paid." /><Table columns={['Student','Class','Outstanding Balance','Grades Status','Actions']} rows={rows} renderCell={(row,c) => { if (c === 'Student') return row.full_name; if (c === 'Class') return fullClassName(data.classes.find(x => x.id === row.class_id)); if (c === 'Outstanding Balance') return `GHS ${Number(row.outstanding).toFixed(2)}`; if (c === 'Grades Status') return <span className={`pill ${row.anyLocked ? 'absent' : 'online'}`}>{row.anyLocked ? 'Locked' : 'Open'}</span>; if (c === 'Actions') return <div className="flex gap-2"><button className="btn btn-outline" onClick={() => toggleLock(row.id)}>{row.outstanding > 0 ? 'Auto Lock' : 'Auto Unlock'}</button><button className="btn btn-outline" onClick={() => manualToggle(row.id, true)}>Lock</button><button className="btn btn-outline" onClick={() => manualToggle(row.id, false)}>Unlock</button></div>; }} /></div>;
}

function PrincipalStudents() {

  const promotionYear = latestAcademicYearFromGrades(data.grades);

  const runAutoPromotion = async () => {
    const term3Students = data.students.filter(student => evaluatePromotion(data, student, promotionYear).evaluated);
    if (!term3Students.length) { notify('info', `No Term 3 grades were found for ${promotionYear}.`); return; }
    await updateCollection('students', items => items.map(student => {
      const result = evaluatePromotion(data, student, promotionYear);

      return { ...student, class_id: result.nextClass.id, student_section: result.nextClass.section || '' };
    }));
    notify('success', `Auto promotion completed for ${promotionYear}.`);
