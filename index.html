function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function cleanPathName(value='file') {

  if (file.size > 2 * 1024 * 1024) throw new Error('Image must be 2MB or less.');
}
async function uploadImageToStorage(file, folder='general') {
  validateImageFile(file);
  if (!supabase?.storage) return fileToDataUrl(file);
  const ext = (file.name.split('.').pop() || 'png').toLowerCase();
  const path = `${cleanPathName(folder)}/${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
  const { error: uploadError } = await supabase.storage.from('school-media').upload(path, file, { upsert: false, cacheControl: '3600' });
  if (uploadError) throw uploadError;
  const { data } = supabase.storage.from('school-media').getPublicUrl(path);
  if (!data?.publicUrl) throw new Error('Image uploaded, but no public URL was returned.');
  return data.publicUrl;
}

function beceGrade(total) {
  const score = Number(total || 0);
  if (score >= 80) return { grade: '1', interpretation: 'Excellent' };
  if (score >= 70) return { grade: '2', interpretation: 'Very Good' };
  if (score >= 60) return { grade: '3', interpretation: 'Good' };
  if (score >= 50) return { grade: '4', interpretation: 'Credit' };
  if (score >= 40) return { grade: '5', interpretation: 'Pass' };
  if (score >= 30) return { grade: '6', interpretation: 'Weak Pass' };
  return { grade: '7', interpretation: 'Fail' };
}

  const a = Number(g.mid_exam_50 || 0);

  return { total_score: total, grade_letter: res.grade, interpretation: res.interpretation };
}
function useAudioNotifications() {
  const ctxRef = React.useRef(null);
  const beep = React.useCallback((freq = 880, duration = 0.12) => {
    try {
      const ACtx = window.AudioContext || window.webkitAudioContext;
      if (!ACtx) return;
      if (!ctxRef.current) ctxRef.current = new ACtx();
      const ctx = ctxRef.current;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.value = 0.03;
      osc.start();
      setTimeout(() => osc.stop(), duration * 1000);
    } catch (e) {}
  }, []);
  return { playSent: () => beep(700, 0.08), playReceived: () => beep(1100, 0.12) };
}

  (subjectAssignmentsRaw || []).forEach(link => {
    if (!subjectIdsByTeacher[link.teacher_id]) subjectIdsByTeacher[link.teacher_id] = [];
    subjectIdsByTeacher[link.teacher_id].push(link.subject_id);
  });

  return {
    schoolSettings: schoolSettingsRes.data || defaultSchool,
    principals: (principalsRaw || []).map(row => {
      const p = profileMap.get(row.profile_id) || {};
      return { ...row, full_name: p.full_name || '', photo_url: p.avatar_url || '', account_active: p.account_active ?? true };
    }),
    accountStaff: (accountStaffRaw || []).map(row => {
      const p = profileMap.get(row.profile_id) || {};
      return { ...row, full_name: p.full_name || '', photo_url: p.avatar_url || '', account_active: p.account_active ?? true };
    }),
    teachers: (teachersRaw || []).map(row => ({ ...row, assigned_class_ids: classIdsByTeacher[row.id] || [], assigned_subject_ids: subjectIdsByTeacher[row.id] || [] })),
    students: (studentsRaw || []),
    parents: (parentsRaw || []).map(row => ({ ...row, linked_student_ids: parentLinksByParent[row.id] || [] })),
    classes: classes || [],
    subjects: subjects || [],
    timetable: timetableRaw || [],
    attendance: (attendanceRaw || []).map(row => ({ ...row, date: row.attendance_date })),
    grades: gradesRaw || [],
    fees: feesRaw || [],
    credentials: (credentialsRaw || []).map(row => ({ ...row, force_password_change: toYesNo(row.force_password_change) })),
    chats: chatsRaw || [],
    presence: withPresenceRows(presenceRaw || [])
  };
}

async function syncProfilesBackedEntities(tableName, roleName, prevItems, nextItems) {
  const prevMap = new Map((prevItems || []).map(item => [item.id, item]));
  const nextMap = new Map((nextItems || []).map(item => [item.id, item]));
  for (const prev of prevItems || []) {
    if (!nextMap.has(prev.id)) {
      if (prev.profile_id) await supabase.from('profiles').delete().eq('id', prev.profile_id);
      else await supabase.from(tableName).delete().eq('id', prev.id);
    }
  }
  for (const item of nextItems || []) {
    if (item.id && prevMap.has(item.id)) {
      const prev = prevMap.get(item.id);
      if (prev.profile_id) {
        await supabase.from('profiles').update({ full_name: item.full_name, role: roleName, contact_address: item.contact_address, avatar_url: item.photo_url || null, account_active: item.account_active ?? true }).eq('id', prev.profile_id);
        await supabase.from(tableName).update({ contact_address: item.contact_address }).eq('id', item.id);
      }
    } else {
      const { data: profileInsert, error: profileError } = await supabase.from('profiles').insert({ full_name: item.full_name, role: roleName, contact_address: item.contact_address, avatar_url: item.photo_url || null, account_active: item.account_active ?? true, force_password_change: true }).select().single();
      if (profileError) throw profileError;
      const { error: rowError } = await supabase.from(tableName).insert({ profile_id: profileInsert.id, contact_address: item.contact_address });
      if (rowError) throw rowError;
    }
  }
}

async function syncTeachers(prevItems, nextItems) {
  const prevMap = new Map((prevItems || []).map(item => [item.id, item]));
  const nextMap = new Map((nextItems || []).map(item => [item.id, item]));
  for (const prev of prevItems || []) {
    if (!nextMap.has(prev.id)) {
      await supabase.from('teacher_class_assignments').delete().eq('teacher_id', prev.id);
      await supabase.from('teacher_subject_assignments').delete().eq('teacher_id', prev.id);
      await supabase.from('teachers').delete().eq('id', prev.id);
    }
  }
  for (const item of nextItems || []) {
    const row = {
      id: dbId(item.id),
      full_name: item.full_name,
      staff_number: item.staff_number || null,
      emis_code: item.emis_code || null,
      ghana_card: item.ghana_card || null,
      gender: item.gender || null,
      dob: item.dob || null,
      qualification: item.qualification || null,
      trained: item.trained || null,
      primary_specialty: item.primary_specialty || null,
      contact_address: item.contact_address || null,
      photo_url: item.photo_url || null,
      account_active: item.account_active ?? true
    };
    const { data: saved, error } = await supabase.from('teachers').upsert(row).select().single();
    if (error) throw error;
    const teacherId = saved.id;
    await supabase.from('teacher_class_assignments').delete().eq('teacher_id', teacherId);
    if (safeArray(item.assigned_class_ids).length) {
      const { error: classErr } = await supabase.from('teacher_class_assignments').insert(safeArray(item.assigned_class_ids).map(classId => ({ teacher_id: teacherId, class_id: classId })));
      if (classErr) throw classErr;
    }
    await supabase.from('teacher_subject_assignments').delete().eq('teacher_id', teacherId);
    if (safeArray(item.assigned_subject_ids).length) {
      const { error: subjectErr } = await supabase.from('teacher_subject_assignments').insert(safeArray(item.assigned_subject_ids).map(subjectId => ({ teacher_id: teacherId, subject_id: subjectId })));
      if (subjectErr) throw subjectErr;
    }
  }
}

async function syncStudents(prevItems, nextItems) {
  const prevMap = new Map((prevItems || []).map(item => [item.id, item]));
  const nextMap = new Map((nextItems || []).map(item => [item.id, item]));
  for (const prev of prevItems || []) {
    if (!nextMap.has(prev.id)) await supabase.from('students').delete().eq('id', prev.id);
  }
  for (const item of nextItems || []) {
    const row = {
      id: dbId(item.id),
      full_name: item.full_name,
      student_number: item.student_number || null,

      relationship: item.relationship || null,
      photo_url: item.photo_url || null,

    };

async function syncParents(prevItems, nextItems) {
  const nextMap = new Map((nextItems || []).map(item => [item.id, item]));
  for (const item of prevItems || []) {
    if (!nextMap.has(item.id)) continue;
  }
  for (const item of nextItems || []) {
    const { error } = await supabase.from('parents').update({ account_status: item.account_status, phone_contact: item.phone_contact || null, relationship: item.relationship || null, full_name: item.full_name }).eq('id', item.id);
    if (error) throw error;
  }
}

async function syncSimpleTable(tableName, prevItems, nextItems, transform) {
  const { deletes, upserts } = diffById(prevItems, nextItems);
  for (const id of deletes) {
    const { error } = await supabase.from(tableName).delete().eq('id', id);
    if (error) throw error;
  }
  for (const item of upserts) {
    const row = transform ? transform(item) : item;
    const { error } = await supabase.from(tableName).upsert(row);
    if (error) throw error;
  }
}

async function syncPresenceStatus(role, linkedId, isOnline) {
  if (!supabase || !linkedId || role === 'admin') return;
  const { data: existing, error: selectError } = await supabase.from('presence_status').select('id').eq('role', role).eq('linked_entity_id', linkedId).maybeSingle();
  if (selectError) throw selectError;
  if (existing?.id) {
    const { error } = await supabase.from('presence_status').update({ is_online: !!isOnline, last_seen: new Date().toISOString() }).eq('id', existing.id);
    if (error) throw error;
  } else {
    const { error } = await supabase.from('presence_status').insert({ role, linked_entity_id: linkedId, is_online: !!isOnline, last_seen: new Date().toISOString() });
    if (error) throw error;
  }
}

function usePersistentSchoolData() {
  const [data, setData] = React.useState(EMPTY_LIVE_DATA);
  const [loaded, setLoaded] = React.useState(false);
  const [busyText, setBusyText] = React.useState('');
  const [notifications, setNotifications] = React.useState([]);

  const notify = React.useCallback((type, message) => {
    const id = uid();
    setNotifications(prev => [...prev, { id, type, message }]);
    window.setTimeout(() => setNotifications(prev => prev.filter(item => item.id !== id)), 3200);
  }, []);
  const dismissNotification = React.useCallback((id) => setNotifications(prev => prev.filter(item => item.id !== id)), []);

  const reloadData = React.useCallback(async () => {
    try {
      const next = await fetchAllSchoolData();
      setData(next);
    } catch (error) {
      console.error('Failed to load live school data', error);
      setData(seedData());
      notify('error', `Live data load failed: ${error?.message || 'using fallback data.'}`);
    } finally {
      setLoaded(true);
    }
  }, [notify]);

  React.useEffect(() => { reloadData(); }, [reloadData]);

  const persist = React.useCallback(async next => { setData(next); }, []);

  const setSchoolSettings = React.useCallback(async updater => {
    const nextVal = typeof updater === 'function' ? updater(data.schoolSettings) : updater;
    try {
      setBusyText('Saving school settings...');
      if (supabase) {
        const { error } = await supabase.from('school_settings').update({ school_name: nextVal.school_name, address: nextVal.address || null, contact: nextVal.contact || null, location: nextVal.location || null, logo_url: nextVal.logo_url || null, theme_choice: normalizeThemeChoice(nextVal.theme_choice || 'emerald') }).eq('id', 1);
        if (error) throw error;
        await reloadData();
      } else {
        setData(prev => ({ ...prev, schoolSettings: nextVal }));
      }
      notify('success', 'School settings saved.');
    } catch (error) {
      console.error('School settings save failed', error);
      notify('error', error?.message || 'Failed to save school settings.');
      throw error;
    } finally {
      setBusyText('');
    }
  }, [data.schoolSettings, reloadData, notify]);

  const updateCollection = React.useCallback(async (key, updater) => {
    const prevItems = data[key] || [];
    const nextItems = typeof updater === 'function' ? updater(prevItems) : updater;
    try {
      setBusyText(`Saving ${key}...`);
      if (!supabase) {
        setData(prev => ({ ...prev, [key]: nextItems }));
        notify('success', `${key} updated.`);
        return;
      }
      if (key === 'principals') await syncProfilesBackedEntities('principals', 'principal', prevItems, nextItems);
      else if (key === 'accountStaff') await syncProfilesBackedEntities('account_staff', 'accountant', prevItems, nextItems);
      else if (key === 'teachers') await syncTeachers(prevItems, nextItems);
      else if (key === 'students') await syncStudents(prevItems, nextItems);
      else if (key === 'parents') await syncParents(prevItems, nextItems);
      else if (key === 'classes') await syncSimpleTable('classes', prevItems, nextItems, item => ({ id: dbId(item.id), name: item.name, section: item.section || null }));
      else if (key === 'subjects') await syncSimpleTable('subjects', prevItems, nextItems, item => ({ id: dbId(item.id), name: item.name, code: item.code || null }));
      else if (key === 'timetable') await syncSimpleTable('timetable', prevItems, nextItems, item => ({ id: dbId(item.id), class_id: item.class_id, day_of_week: item.day_of_week, period_time: item.period_time, subject_id: item.subject_id, teacher_id: item.teacher_id }));
      else if (key === 'attendance') await syncSimpleTable('attendance', prevItems, nextItems, item => ({ id: dbId(item.id), class_id: item.class_id, student_id: item.student_id, teacher_id: item.teacher_id || null, attendance_date: item.date || item.attendance_date || today(), status: item.status, remarks: item.remarks || null }));
      else if (key === 'grades') await syncSimpleTable('grades', prevItems, nextItems, item => ({ id: dbId(item.id), class_id: item.class_id, student_id: item.student_id, teacher_id: item.teacher_id || null, subject_id: item.subject_id, term: item.term, academic_year: item.academic_year, mid_exam_50: Number(item.mid_exam_50 || 0), end_exam_50: Number(item.end_exam_50 || 0), grade_letter: item.grade_letter || null, interpretation: item.interpretation || null, position: item.position || null, teacher_initial: item.teacher_initial || null, locked: !!item.locked }));
      else if (key === 'fees') await syncSimpleTable('fees', prevItems, nextItems, item => ({ id: dbId(item.id), student_id: item.student_id, class_id: item.class_id, academic_year: item.academic_year, term: item.term, amount_due: Number(item.amount_due || 0), amount_paid: Number(item.amount_paid || 0), payment_method: item.payment_method || null, recorded_by: item.recorded_by || null }));
      else if (key === 'credentials') await syncSimpleTable('user_credentials', prevItems, nextItems, item => ({ id: dbId(item.id), role: item.role, linked_entity_id: item.linked_entity_id, username: item.username, temporary_password: item.temporary_password, force_password_change: fromYesNo(item.force_password_change), account_active: item.account_active ?? true }));
      else if (key === 'chats') await syncSimpleTable('chat_messages', prevItems, nextItems, item => ({ id: dbId(item.id), sender_role: item.sender_role, sender_id: item.sender_id || null, receiver_role: item.receiver_role, receiver_id: item.receiver_id || null, message: item.message, is_read: !!item.is_read, deleted_by_sender: !!item.deleted_by_sender, deleted_by_receiver: !!item.deleted_by_receiver, banned: !!item.banned, created_at: item.created_at || new Date().toISOString() }));
      else {
        setData(prev => ({ ...prev, [key]: nextItems }));
        notify('success', `${key} updated.`);
        return;
      }
      await reloadData();
      notify('success', `${key} saved successfully.`);
    } catch (error) {
      console.error(`Failed to update ${key}`, error);
      notify('error', error?.message || `Failed to save ${key}.`);
      throw error;
    } finally {
      setBusyText('');
    }
  }, [data, reloadData, notify]);

  const setPresenceStatus = React.useCallback(async (role, linkedId, isOnline) => {
    setData(prev => ({ ...prev, presence: { ...prev.presence, [role]: { ...(prev.presence[role] || { name: ROLE_LABELS[role] }), online: !!isOnline } } }));
    try { await syncPresenceStatus(role, linkedId, isOnline); } catch (error) { console.error('Presence sync failed', error); }
  }, []);

  return { data, loaded, persist, updateCollection, setSchoolSettings, reloadData, setPresenceStatus, notify, notifications, dismissNotification, busyText };
}

function ImageInput({ label, value, onChange, storageFolder='general' }) { const { notify } = React.useContext(DataContext); const [uploading, setUploading] = React.useState(false); return <div><label className="block text-sm font-semibold mb-2">{label}</label><div className="flex items-center gap-4">{value ? <img src={value} alt="" className="w-16 h-16 rounded-full object-cover border" /> : <div className="w-16 h-16 rounded-full bg-slate-100 flex items-center justify-center border"><i className="fas fa-image text-slate-400"></i></div>}<div className="space-y-2"><input type="file" accept="image/*" disabled={uploading} onChange={async e => { const file = e.target.files?.[0]; if (!file) return; setUploading(true); try { const url = await uploadImageToStorage(file, storageFolder || label); onChange(url); notify('success', 'Image uploaded successfully.'); } catch (error) { console.error('Image upload failed', error); try { const fallback = await fileToDataUrl(file); onChange(fallback); notify('info', 'Storage upload failed, so a local image version was used.'); } catch (_) { notify('error', error?.message || 'Image upload failed.'); } } finally { setUploading(false); } }} /><div className="text-xs text-slate-400">{uploading ? 'Uploading image...' : 'PNG or JPG, up to 2MB.'}</div></div></div></div>; }

function PrintButton({ label='Print' }) { return <button onClick={printCurrent} className="btn btn-outline"><i className="fas fa-print mr-2"></i>{label}</button>; }

function linkedEntityName(data, role, linkedId) {
  const collection = role === 'teacher' ? data.teachers : role === 'student' ? data.students : role === 'parent' ? data.parents : role === 'accountant' ? data.accountStaff : role === 'principal' ? data.principals : [];
  return collection.find(x => x.id === linkedId)?.full_name || ROLE_LABELS[role];
}
function availableLinkedRecords(data, role) { if (role === 'teacher') return data.teachers; if (role === 'student') return data.students; if (role === 'parent') return data.parents; if (role === 'accountant') return data.accountStaff; if (role === 'principal') return data.principals; return []; }
function validateCollectionRecord(kind, item, existingItems, identityField='id') {
  const peers = (existingItems || []).filter(x => x[identityField] !== item[identityField]);
  if (kind === 'teacher') {
    if (!item.full_name?.trim()) throw new Error('Teacher full name is required.');
    if (item.emis_code && peers.some(x => (x.emis_code || '').trim().toLowerCase() === item.emis_code.trim().toLowerCase())) throw new Error('Teacher EMIS code already exists.');
    if (item.ghana_card && peers.some(x => (x.ghana_card || '').trim().toLowerCase() === item.ghana_card.trim().toLowerCase())) throw new Error('Teacher Ghana Card already exists.');
  }
  if (kind === 'student') {
    if (!item.full_name?.trim()) throw new Error('Student full name is required.');
    if (!item.class_id) throw new Error('Assign a class before saving the student.');
    if (!isValidPhone(item.parent_phone_contact || '')) throw new Error('Parent phone contact must contain 9 to 15 digits.');
  }
  if (kind === 'class') {
    if (peers.some(x => (x.name || '').trim().toLowerCase() === (item.name || '').trim().toLowerCase() && (x.section || '').trim().toLowerCase() === (item.section || '').trim().toLowerCase())) throw new Error('That class and section already exist.');
  }
  if (kind === 'subject') {
    if (peers.some(x => (x.name || '').trim().toLowerCase() === (item.name || '').trim().toLowerCase())) throw new Error('That subject already exists.');
  }
}

function App() {
  const store = usePersistentSchoolData();
  const [session, setSession] = React.useState({ role: null, linkedId: null, credentialId: null, username: '' });
  const [activeNav, setActiveNav] = React.useState('dashboard');
  const [authReady, setAuthReady] = React.useState(false);
  const [forcePasswordModal, setForcePasswordModal] = React.useState(false);
  const [themeChoice, setThemeChoiceState] = React.useState(() => normalizeThemeChoice(localStorage.getItem(THEME_STORAGE_KEY) || 'emerald'));
  const setThemeChoice = React.useCallback((value) => {
    const nextTheme = normalizeThemeChoice(value);
    setThemeChoiceState(nextTheme);
    try { localStorage.setItem(THEME_STORAGE_KEY, nextTheme); } catch (e) {}
  }, []);

  React.useEffect(() => {
    (async () => {
      try { if (supabase) await ensureSupabaseBrowserSession(); } catch (error) { console.error('Supabase browser session init failed', error); }
      setAuthReady(true);
    })();
  }, []);

  React.useEffect(() => { applyTheme(themeChoice); }, [themeChoice]);

  React.useEffect(() => {
    if (!store.loaded) return;
    const nextTheme = normalizeThemeChoice(store.data.schoolSettings?.theme_choice || localStorage.getItem(THEME_STORAGE_KEY) || 'emerald');
    if (nextTheme !== themeChoice) setThemeChoiceState(nextTheme);
    else applyTheme(nextTheme);
  }, [store.loaded, store.data.schoolSettings?.theme_choice]);

  React.useEffect(() => {
    if (!authReady || !store.loaded) return;
    const saved = loadAppUserSession();
    if (!saved?.credentialId) return;
    const credential = store.data.credentials.find(c => c.id === saved.credentialId && c.account_active);
    if (!credential) { clearAppUserSession(); return; }
    setSession({ role: credential.role, linkedId: credential.linked_entity_id, credentialId: credential.id, username: credential.username });
    if (credential.force_password_change === 'Yes') setForcePasswordModal(true);
  }, [authReady, store.loaded, store.data.credentials]);

  const loginWithCredentials = React.useCallback(async (username, password) => {
    const credential = store.data.credentials.find(c => (c.username || '').trim().toLowerCase() === String(username || '').trim().toLowerCase() && c.account_active);
    if (!credential) throw new Error('Invalid username or password.');
    if ((credential.temporary_password || '') !== String(password || '')) throw new Error('Invalid username or password.');
    await store.setPresenceStatus(credential.role, credential.linked_entity_id, true);
    const nextSession = { role: credential.role, linkedId: credential.linked_entity_id, credentialId: credential.id, username: credential.username };
    setSession(nextSession);
    saveAppUserSession(nextSession);
    setActiveNav('dashboard');
    setForcePasswordModal(credential.force_password_change === 'Yes');
    return credential;
  }, [store]);

  const logout = React.useCallback(async () => {
    if (session.role) await store.setPresenceStatus(session.role, session.linkedId, false);
    clearAppUserSession();
    setSession({ role: null, linkedId: null, credentialId: null, username: '' });
    setActiveNav('dashboard');
    setForcePasswordModal(false);
  }, [session, store]);

  const changeOwnPassword = React.useCallback(async (newPassword) => {
    if (!session.credentialId) return;
    await store.updateCollection('credentials', items => items.map(item => item.id === session.credentialId ? { ...item, temporary_password: newPassword, force_password_change: 'No' } : item));
    setForcePasswordModal(false);
  }, [session.credentialId, store]);

  if (!store.loaded || !authReady) return <div className="p-10 text-center">Loading system...</div>;
  return <DataContext.Provider value={store}><SessionContext.Provider value={{ session, setSession, activeNav, setActiveNav, loginWithCredentials, logout, forcePasswordModal, setForcePasswordModal, changeOwnPassword, themeChoice, setThemeChoice }}><div className="min-h-screen flex flex-col"><Header /><div className="flex flex-1">{session.role && <Sidebar />}<main className="flex-1 p-4 md:p-6">{!session.role ? <LoginScreen /> : <DashboardRouter />}</main></div><ForcePasswordChangeModal open={!!session.role && forcePasswordModal} onSave={changeOwnPassword} /><BusyOverlay text={store.busyText} /><ToastStack notifications={store.notifications} onDismiss={store.dismissNotification} /></div></SessionContext.Provider></DataContext.Provider>;
}

function LoginScreen() {
  const { data } = React.useContext(DataContext);
  const { loginWithCredentials } = React.useContext(SessionContext);
  const { notify } = React.useContext(DataContext);
  const [username, setUsername] = React.useState('');
  const [password, setPassword] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState('');

  const onSubmit = async (e) => {
    e.preventDefault();
    setLoading(true);
    setError('');
    try {
      await loginWithCredentials(username, password);
      notify('success', 'Signed in successfully.');
    } catch (err) {
      setError(err?.message || 'Login failed.');
      notify('error', err?.message || 'Login failed.');
    } finally {
      setLoading(false);
    }
  };

  return <div className="max-w-6xl mx-auto mt-8 grid lg:grid-cols-2 gap-6"><div className="card p-8 flex flex-col justify-center"><div className="mb-5"><span className="pill online">Secure Login</span></div><h2 className="text-4xl font-black text-slate-900 mb-3">Welcome back to your school management system.</h2><div className="mt-4 text-xs text-slate-400">School: {data.schoolSettings.school_name}</div></div><div className="card p-8"><form onSubmit={onSubmit} className="space-y-4"><Field label="Username"><input className="input" value={username} onChange={e => setUsername(e.target.value)} placeholder="Enter your username" autoComplete="username" required /></Field><Field label="Password"><input type="password" className="input" value={password} onChange={e => setPassword(e.target.value)} placeholder="Enter your password" autoComplete="current-password" required /></Field>{error && <div className="rounded-xl bg-red-50 border border-red-200 text-red-700 px-4 py-3 text-sm">{error}</div>}<button type="submit" disabled={loading} className="btn btn-primary w-full">{loading ? 'Signing in...' : 'Sign In'}</button></form><div className="mt-6 text-sm text-slate-500">For first login, use the temporary password from Accounts & Credentials. You will be prompted to change it if required.</div></div></div>;
}


function ForcePasswordChangeModal({ open, onSave }) {
  const [newPassword, setNewPassword] = React.useState('');
  const [confirmPassword, setConfirmPassword] = React.useState('');
  const [error, setError] = React.useState('');
  React.useEffect(() => {
    if (!open) { setNewPassword(''); setConfirmPassword(''); setError(''); }
  }, [open]);
  const submit = async (e) => {
    e.preventDefault();
    if (newPassword.length < 8) { setError('Password must be at least 8 characters.'); return; }
    if (newPassword !== confirmPassword) { setError('Passwords do not match.'); return; }
    setError('');
    await onSave(newPassword);
  };
  if (!open) return null;
  return <Modal open={open} title="Change Temporary Password" onClose={() => {}} max="max-w-xl"><form onSubmit={submit} className="space-y-4"><div className="rounded-xl bg-amber-50 border border-amber-200 text-amber-800 px-4 py-3 text-sm">You must change your temporary password before continuing.</div><Field label="New Password"><input type="password" className="input" value={newPassword} onChange={e => setNewPassword(e.target.value)} required /></Field><Field label="Confirm Password"><input type="password" className="input" value={confirmPassword} onChange={e => setConfirmPassword(e.target.value)} required /></Field>{error && <div className="rounded-xl bg-red-50 border border-red-200 text-red-700 px-4 py-3 text-sm">{error}</div>}<div className="flex justify-end gap-2"><button type="submit" className="btn btn-primary">Save New Password</button></div></form></Modal>;
}

function FeesStatement() {

}

function GradeLockControl() {
  const { data, updateCollection } = React.useContext(DataContext); const toggleLock = async studentId => { const feeRows = data.fees.filter(f => f.student_id === studentId); const outstanding = feeRows.reduce((sum, f) => sum + Number(f.balance || 0), 0); const shouldLock = outstanding > 0; await updateCollection('grades', items => items.map(g => g.student_id === studentId ? { ...g, locked: shouldLock } : g)); }; const manualToggle = async (studentId, lock) => updateCollection('grades', items => items.map(g => g.student_id === studentId ? { ...g, locked: lock } : g));
  const rows = data.students.map(st => { const feeRows = data.fees.filter(f => f.student_id === st.id); const outstanding = feeRows.reduce((sum, f) => sum + Number(f.balance || 0), 0); const anyLocked = data.grades.some(g => g.student_id === st.id && g.locked); return { ...st, outstanding, anyLocked }; });
  return <div className="space-y-4"><SectionHeader title="Grades Lock Control" subtitle="Students owing fees can be locked automatically or manually unlocked when fully paid." /><Table columns={['Student','Class','Outstanding Balance','Grades Status','Actions']} rows={rows} renderCell={(row,c) => { if (c === 'Student') return row.full_name; if (c === 'Class') return fullClassName(data.classes.find(x => x.id === row.class_id)); if (c === 'Outstanding Balance') return `GHS ${Number(row.outstanding).toFixed(2)}`; if (c === 'Grades Status') return <span className={`pill ${row.anyLocked ? 'absent' : 'online'}`}>{row.anyLocked ? 'Locked' : 'Open'}</span>; if (c === 'Actions') return <div className="flex gap-2"><button className="btn btn-outline" onClick={() => toggleLock(row.id)}>{row.outstanding > 0 ? 'Auto Lock' : 'Auto Unlock'}</button><button className="btn btn-outline" onClick={() => manualToggle(row.id, true)}>Lock</button><button className="btn btn-outline" onClick={() => manualToggle(row.id, false)}>Unlock</button></div>; }} /></div>;
}

function PrincipalDashboard({ activeNav }) {
  const { data } = React.useContext(DataContext); const { session } = React.useContext(SessionContext); const principal = data.principals.find(p => p.id === session.linkedId) || data.principals[0]; if (!principal) return <EmptyState text="No principal record found." />;
  if (activeNav === 'dashboard') { const attendanceOverview = data.attendance.length; const performanceOverview = data.grades.length; return <div className="space-y-6"><SectionHeader title={`Welcome, ${principal.full_name}`} subtitle="Principal dashboard overview of students, teachers, academic performance, attendance, and teacher class assignment summaries." actions={<RoleStatusDot online={data.presence.principal?.online} label="Principal Status" />} /><div className="grid-fit"><StatCard label="Total Students" value={data.students.length} icon="user-graduate" accent="blue" /><StatCard label="Total Teachers" value={data.teachers.length} icon="chalkboard-user" accent="emerald" /><StatCard label="Total Subjects" value={data.subjects.length} icon="book" accent="indigo" /><StatCard label="Student Attendance Overview" value={attendanceOverview} icon="calendar-alt" accent="amber" /><StatCard label="Student Performance Overview" value={performanceOverview} icon="chart-line" accent="rose" /><StatCard label="Class Academic Performance Summary" value={data.classes.length} icon="layer-group" accent="sky" /></div><div className="grid md:grid-cols-2 gap-4"><div className="card p-5"><h3 className="font-bold mb-3">Teacher Assign Class and Primary Specialty Summary</h3><ul className="space-y-2 text-sm">{data.teachers.map(t => <li key={t.id}><b>{t.full_name}</b>, {safeArray(t.assigned_class_ids).map(id => fullClassName(data.classes.find(c => c.id === id))).join(', ')}, {t.primary_specialty}</li>)}</ul></div><div className="card p-5"><h3 className="font-bold mb-3">Recent Academic Updates</h3><ul className="space-y-2 text-sm">{data.grades.slice(0,5).map(g => <li key={g.id}>{data.students.find(s => s.id === g.student_id)?.full_name} received {g.total_score}% in {data.subjects.find(s => s.id === g.subject_id)?.name}.</li>)}</ul></div></div></div>; }
  if (activeNav === 'students') return <PrincipalStudents />;
  if (activeNav === 'teachers') return <PrincipalTeachers />;
  if (activeNav === 'academic') return <PrincipalAcademicPerformance />;
  if (activeNav === 'attendance') return <PrincipalAttendanceSummary />;
  if (activeNav === 'chat') return <ChatManagement role="principal" linkedId={principal.id} />;
  return null;
}

function PrincipalStudents() {
  const { data } = React.useContext(DataContext); const [filterClass, setFilterClass] = React.useState('');
  const rows = data.students.filter(s => !filterClass || s.class_id === filterClass);
  return <div className="space-y-4"><SectionHeader title="Student Management" subtitle="View only student records with real time class filtering." actions={<><Field label=""><select className="select" value={filterClass} onChange={e => setFilterClass(e.target.value)}><option value="">All classes</option>{data.classes.map(c => <option key={c.id} value={c.id}>{fullClassName(c)}</option>)}</select></Field><PrintButton label="Print Students Records" /></>} /><Table columns={['Full Name','Student No','Assigned Class','Gender','Date of Birth','Parent Full Name','Parent Contact','Account']} rows={rows} renderCell={(row,c) => { if (c === 'Full Name') return row.full_name; if (c === 'Student No') return row.student_number; if (c === 'Assigned Class') return fullClassName(data.classes.find(x => x.id === row.class_id)); if (c === 'Gender') return row.gender; if (c === 'Date of Birth') return row.dob; if (c === 'Parent Full Name') return row.parent_full_name; if (c === 'Parent Contact') return row.parent_phone_contact; if (c === 'Account') return <span className={`pill ${row.account_active ? 'online' : 'offline'}`}>{row.account_active ? 'Active' : 'Inactive'}</span>; }} /></div>;
}

function PrincipalTeachers() {
  const { data } = React.useContext(DataContext);
  return <div className="space-y-4"><SectionHeader title="Teacher Management Records" subtitle="View only teacher records reflected from School Admin changes." actions={<PrintButton label="Print Teachers Records" />} /><Table columns={['Full Name','Teacher EMIS Code','Assign Class','Primary Specialty','Qualification','Gender','Date of Birth','Training Status','Account','Chat']} rows={data.teachers} renderCell={(row,c) => { if (c === 'Full Name') return row.full_name; if (c === 'Teacher EMIS Code') return row.emis_code; if (c === 'Assign Class') return safeArray(row.assigned_class_ids).map(id => fullClassName(data.classes.find(cls => cls.id === id))).join(', '); if (c === 'Primary Specialty') return row.primary_specialty; if (c === 'Qualification') return row.qualification; if (c === 'Gender') return row.gender; if (c === 'Date of Birth') return row.dob; if (c === 'Training Status') return row.trained; if (c === 'Account') return <span className={`pill ${row.account_active ? 'online' : 'offline'}`}>{row.account_active ? 'Active' : 'Inactive'}</span>; if (c === 'Chat') return <i className="fas fa-comments text-emerald-600"></i>; }} /></div>;
}

function PrincipalAcademicPerformance() {
  const { data } = React.useContext(DataContext); const [classId, setClassId] = React.useState(''); const [studentId, setStudentId] = React.useState(''); const [term, setTerm] = React.useState(''); const [year, setYear] = React.useState(''); const studentOptions = data.students.filter(s => !classId || s.class_id === classId); const rows = data.grades.filter(g => (!classId || g.class_id === classId) && (!studentId || g.student_id === studentId) && (!term || g.term === term) && (!year || g.academic_year === year));
  return <div className="space-y-4"><SectionHeader title="Academic Performance" subtitle="Filter by class, student, term, and academic year. Printable student academic reports are supported." actions={<><Field label=""><select className="select" value={classId} onChange={e => { setClassId(e.target.value); setStudentId(''); }}><option value="">All classes</option>{data.classes.map(c => <option key={c.id} value={c.id}>{fullClassName(c)}</option>)}</select></Field><Field label=""><select className="select" value={studentId} onChange={e => setStudentId(e.target.value)}><option value="">All students</option>{studentOptions.map(s => <option key={s.id} value={s.id}>{s.full_name}</option>)}</select></Field><Field label=""><select className="select" value={term} onChange={e => setTerm(e.target.value)}><option value="">All terms</option>{TERMS.map(x => <option key={x}>{x}</option>)}</select></Field><Field label=""><input className="input" placeholder="Academic year" value={year} onChange={e => setYear(e.target.value)} /></Field><PrintButton label="Print Academic Report" /></>} /><Table columns={['Student','Class','Subject','Term','Mid Semester Exams A (50)','End of Semester Exams B (50)','Total A+B%','Grade','Interpretation','Position','Teacher Initial']} rows={rows} renderCell={(row,c) => { if (c === 'Student') return data.students.find(x => x.id === row.student_id)?.full_name || ''; if (c === 'Class') return fullClassName(data.classes.find(x => x.id === row.class_id)); if (c === 'Subject') return data.subjects.find(x => x.id === row.subject_id)?.name || ''; if (c === 'Term') return row.term; if (c === 'Mid Semester Exams A (50)') return row.mid_exam_50; if (c === 'End of Semester Exams B (50)') return row.end_exam_50; if (c === 'Total A+B%') return row.total_score; if (c === 'Grade') return row.grade_letter; if (c === 'Interpretation') return row.interpretation; if (c === 'Position') return row.position; if (c === 'Teacher Initial') return row.teacher_initial; }} /></div>;
}

function PrincipalAttendanceSummary() {
  const { data } = React.useContext(DataContext); const [classId, setClassId] = React.useState(''); const rows = data.attendance.filter(a => !classId || a.class_id === classId).map(a => ({ ...a, teacher_present: !!a.teacher_id }));
  return <div className="space-y-4"><SectionHeader title="Attendance Summary" subtitle="Teacher attendance entries automatically reflect here for principal monitoring." actions={<Field label=""><select className="select" value={classId} onChange={e => setClassId(e.target.value)}><option value="">All classes</option>{data.classes.map(c => <option key={c.id} value={c.id}>{fullClassName(c)}</option>)}</select></Field>} /><Table columns={['Date','Student','Class','Status','Teacher','Teacher Presence','Remarks']} rows={rows} renderCell={(row,c) => { if (c === 'Date') return row.date; if (c === 'Student') return data.students.find(x => x.id === row.student_id)?.full_name || ''; if (c === 'Class') return fullClassName(data.classes.find(x => x.id === row.class_id)); if (c === 'Status') return <span className={`pill ${statusClass(row.status)}`}>{row.status}</span>; if (c === 'Teacher') return data.teachers.find(x => x.id === row.teacher_id)?.full_name || ''; if (c === 'Teacher Presence') return <span className={`pill ${row.teacher_present ? 'online' : 'offline'}`}>{row.teacher_present ? 'Present in class' : 'Absent from class'}</span>; if (c === 'Remarks') return row.remarks; }} /></div>;
}

function chatAudienceOptions(data, role, linkedId) {
  if (role === 'admin') return [...data.teachers.map(x => ({ id: x.id, label: `${x.full_name} (Teacher)`, role: 'teacher' })), ...data.principals.map(x => ({ id: x.id, label: `${x.full_name} (Principal)`, role: 'principal' })), ...data.students.map(x => ({ id: x.id, label: `${x.full_name} (Student)`, role: 'student' }))];
  if (role === 'teacher') { const teacher = data.teachers.find(x => x.id === linkedId); const assignedClassIds = safeArray(teacher?.assigned_class_ids); return [...data.students.filter(s => assignedClassIds.includes(s.class_id)).map(x => ({ id: x.id, label: `${x.full_name} (Student)`, role: 'student' })), ...data.parents.filter(p => p.linked_student_ids.some(id => assignedClassIds.includes(data.students.find(s => s.id === id)?.class_id))).map(x => ({ id: x.id, label: `${x.full_name} (Parent)`, role: 'parent' })), ...data.principals.map(x => ({ id: x.id, label: `${x.full_name} (Principal)`, role: 'principal' }))]; }
  if (role === 'student') { const student = data.students.find(x => x.id === linkedId); const classmates = data.students.filter(s => s.class_id === student?.class_id && s.id !== linkedId).map(x => ({ id: x.id, label: `${x.full_name} (Student)`, role: 'student' })); const classTeachers = data.teachers.filter(t => safeArray(t.assigned_class_ids).includes(student?.class_id)).map(x => ({ id: x.id, label: `${x.full_name} (Teacher)`, role: 'teacher' })); return [...classmates, ...classTeachers]; }
  if (role === 'parent') { const parent = data.parents.find(x => x.id === linkedId); const linkedStudent = data.students.find(s => parent?.linked_student_ids?.includes(s.id)); return data.teachers.filter(t => safeArray(t.assigned_class_ids).includes(linkedStudent?.class_id)).map(x => ({ id: x.id, label: `${x.full_name} (Teacher)`, role: 'teacher' })); }
  if (role === 'principal') return data.teachers.map(x => ({ id: x.id, label: `${x.full_name} (Teacher)`, role: 'teacher' }));
  return [];
}

function ChatManagement({ role, linkedId=null }) {
  const { data, updateCollection } = React.useContext(DataContext);
  const { playSent, playReceived } = useAudioNotifications();
  const [mode, setMode] = React.useState(CHAT_MODES[role]?.[0] || 'Live Chat');
  const [receiver, setReceiver] = React.useState('');
  const [message, setMessage] = React.useState('');
  const [showEmojiPicker, setShowEmojiPicker] = React.useState(false);
  const [isRecording, setIsRecording] = React.useState(false);
  const [audioPreview, setAudioPreview] = React.useState('');
  const mediaRecorderRef = React.useRef(null);
  const audioChunksRef = React.useRef([]);
  const audience = chatAudienceOptions(data, role, linkedId);
  const currentName = role === 'admin' ? 'School Admin' : linkedEntityName(data, role, linkedId);
  const visibleMessages = data.chats.filter(msg => {
    if (role === 'admin') {
      if (mode === 'Monitor Students') return msg.sender_role === 'student' || msg.receiver_role === 'student';
      if (mode === 'Access Control') return msg.sender_role === 'student' || msg.receiver_role === 'student';
      return true;
    }
    if (role === 'teacher') {
      if (mode === 'Monitor Students') return msg.sender_role === 'student' || msg.receiver_role === 'student';
      return (msg.sender_role === role && msg.sender_id === linkedId) || (msg.receiver_role === role && msg.receiver_id === linkedId);
    }
    return (msg.sender_role === role && msg.sender_id === linkedId) || (msg.receiver_role === role && msg.receiver_id === linkedId);
  }).filter(msg => !(msg.sender_role === role && msg.sender_id === linkedId && msg.deleted_by_sender) && !(msg.receiver_role === role && msg.receiver_id === linkedId && msg.deleted_by_receiver));

  const insertEmoji = emoji => { setMessage(prev => `${prev}${emoji}`); setShowEmojiPicker(false); };
  const startRecording = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const recorder = new MediaRecorder(stream);
      audioChunksRef.current = [];
      recorder.ondataavailable = event => { if (event.data.size > 0) audioChunksRef.current.push(event.data); };
      recorder.onstop = () => {
        const blob = new Blob(audioChunksRef.current, { type: 'audio/webm' });
        const reader = new FileReader();
        reader.onloadend = () => setAudioPreview(reader.result);
        reader.readAsDataURL(blob);
        stream.getTracks().forEach(track => track.stop());
      };
      mediaRecorderRef.current = recorder;
      recorder.start();
      setIsRecording(true);
    } catch (error) {
      alert('Audio recording could not start. Please allow microphone access.');
    }
  };
  const stopRecording = () => {
    if (mediaRecorderRef.current && isRecording) {
      mediaRecorderRef.current.stop();
      setIsRecording(false);
    }
  };
  const clearAudioPreview = () => setAudioPreview('');

  const send = async () => {
    if (!receiver || (!message.trim() && !audioPreview)) return;
    const [receiverRole, receiverId] = receiver.split('|');
    const finalMessage = audioPreview ? JSON.stringify({ type: 'audio', audio: audioPreview, text: message.trim() }) : message.trim();
    const payload = { id: uid(), sender_role: role, sender_id: role === 'admin' ? null : linkedId, receiver_role: receiverRole, receiver_id: receiverId, message: finalMessage, created_at: new Date().toISOString(), is_read: false, deleted_by_sender: false, deleted_by_receiver: false, banned: false };
    await updateCollection('chats', items => [payload, ...items]);
    playSent();
    setMessage('');
    setAudioPreview('');
    setTimeout(playReceived, 120);
  };
  const editMsg = async row => {
    if (row.message?.startsWith('{"type":"audio"')) { alert('Audio messages cannot be edited.'); return; }
    const next = prompt('Edit message', row.message);
    if (next == null) return;
    await updateCollection('chats', items => items.map(x => x.id === row.id ? { ...x, message: next } : x));
  };
  const deleteForSender = async row => updateCollection('chats', items => items.map(x => x.id === row.id ? { ...x, deleted_by_sender: true } : x));
  const deleteForReceiver = async row => updateCollection('chats', items => items.map(x => x.id === row.id ? { ...x, deleted_by_receiver: true } : x));
  const adminBanToggle = async row => updateCollection('chats', items => items.map(x => x.id === row.id ? { ...x, banned: !x.banned } : x));
  const adminPermanentDelete = async row => { if (!confirmDeleteAction('this chat message permanently')) return; await updateCollection('chats', items => items.filter(x => x.id !== row.id)); };

  return <div className="space-y-4"><SectionHeader title="System Chat Management" subtitle={`Current user: ${currentName}. Sound plays on send and receive.`} /><div className="flex flex-wrap gap-2">{(CHAT_MODES[role] || []).map(x => <button key={x} onClick={() => setMode(x)} className={`btn ${mode === x ? 'btn-primary' : 'btn-outline'}`}>{x}</button>)}</div>{mode !== 'Monitor Students' && mode !== 'Access Control' && role !== 'accountant' && <div className="card p-4"><div className="grid md:grid-cols-[1fr,2fr,auto] gap-3"><select className="select" value={receiver} onChange={e => setReceiver(e.target.value)}><option value="">Select chat recipient</option>{audience.map(a => <option key={`${a.role}|${a.id}`} value={`${a.role}|${a.id}`}>{a.label}</option>)}</select><div className="space-y-3"><div className="flex gap-2"><input className="input" placeholder="Type your message" value={message} onChange={e => setMessage(e.target.value)} /><button type="button" onClick={() => setShowEmojiPicker(prev => !prev)} className="btn btn-outline" title="Emoji menu"><i className="far fa-face-smile"></i></button>{!isRecording ? <button type="button" onClick={startRecording} className="btn btn-outline" title="Record audio"><i className="fas fa-microphone"></i></button> : <button type="button" onClick={stopRecording} className="btn btn-danger" title="Stop recording"><i className="fas fa-stop"></i></button>}</div>{showEmojiPicker && <div className="border rounded-2xl p-3 bg-slate-50"><div className="text-xs font-semibold text-slate-500 mb-2">Emoji messages</div><div className="flex flex-wrap gap-2">{EMOJI_OPTIONS.map(emoji => <button key={emoji} type="button" onClick={() => insertEmoji(emoji)} className="text-2xl leading-none hover:scale-110 transition">{emoji}</button>)}</div></div>}{audioPreview && <div className="border rounded-2xl p-3 bg-slate-50"><div className="text-xs font-semibold text-slate-500 mb-2">Audio message preview</div><audio controls src={audioPreview} className="w-full"></audio><button type="button" onClick={clearAudioPreview} className="btn btn-outline mt-3">Remove Audio</button></div>}{isRecording && <div className="text-sm text-red-600 font-semibold">Recording audio message...</div>}</div><button onClick={send} className="btn btn-primary"><i className="fas fa-paper-plane mr-2"></i>Send</button></div></div>}<div className="space-y-3">{visibleMessages.length === 0 && <EmptyState text="No chat messages found for this mode." />}{visibleMessages.map(msg => { const senderName = msg.sender_role === 'admin' ? 'School Admin' : linkedEntityName(data, msg.sender_role, msg.sender_id); const receiverName = msg.receiver_role === 'admin' ? 'School Admin' : linkedEntityName(data, msg.receiver_role, msg.receiver_id); const isSender = msg.sender_role === role && (role === 'admin' ? msg.sender_role === 'admin' : msg.sender_id === linkedId); const isReceiver = msg.receiver_role === role && (role === 'admin' ? msg.receiver_role === 'admin' : msg.receiver_id === linkedId); const isStudentMessage = msg.sender_role === 'student' || msg.receiver_role === 'student'; let parsedAudio = null; let plainMessage = msg.message; try { const parsed = JSON.parse(msg.message); if (parsed?.type === 'audio' && parsed?.audio) { parsedAudio = parsed; plainMessage = parsed.text || ''; } } catch (e) {} return <div key={msg.id} className="card p-4"><div className="flex justify-between gap-4"><div><div className="font-semibold">{senderName} <span className="text-slate-400">to</span> {receiverName}</div><div className="text-xs text-slate-400">{new Date(msg.created_at).toLocaleString()}</div>{plainMessage && <div className="mt-2">{plainMessage}</div>}{parsedAudio && <div className="mt-3"><div className="text-xs font-semibold text-slate-500 mb-2">Audio message</div><audio controls src={parsedAudio.audio} className="w-full max-w-md"></audio></div>}</div><div className="flex flex-wrap gap-2 h-fit">{isSender && !parsedAudio && <button className="btn btn-outline" onClick={() => editMsg(msg)}>Edit</button>}{isSender && <button className="btn btn-outline" onClick={() => deleteForSender(msg)}>Delete Sent</button>}{isReceiver && <button className="btn btn-outline" onClick={() => deleteForReceiver(msg)}>Delete Received</button>}{role === 'admin' && isStudentMessage && <button className="btn btn-outline" onClick={() => adminBanToggle(msg)}>{msg.banned ? 'Restore Student Chat' : 'Ban Student Chat'}</button>}{role === 'admin' && isStudentMessage && <button className="btn btn-danger" onClick={() => adminPermanentDelete(msg)}>Permanent Delete</button>}</div></div>{role === 'admin' && isStudentMessage && <div className={`mt-3 pill ${msg.banned ? 'absent' : 'online'}`}>{msg.banned ? 'Student Chat Banned' : 'Student Chat Allowed'}</div>}</div>; })}</div></div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
